name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv venv
      - run: uv pip install -e ".[dev]"
      - run: uv run pytest -q

  backend-postgres:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sprout
          POSTGRES_PASSWORD: sprout
          POSTGRES_DB: sprout
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sprout"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      SPROUT_TEST_DATABASE_URL: postgresql+psycopg://sprout:sprout@localhost:5432/sprout
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv venv
      - run: uv pip install -e ".[dev]"
      - run: uv run pytest -q

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build
