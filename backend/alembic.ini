# Sprout Alembic configuration. The database URL is resolved at runtime by
# alembic/env.py from the app's own SPROUT_DATABASE_URL / SPROUT_DB_PATH logic,
# so sqlalchemy.url is intentionally NOT set here.

[alembic]
# Migration scripts live here; %(here)s is this ini file's directory, so the
# whole chain is cwd-independent (init_db runs in-process under FastAPI).
script_location = %(here)s/alembic

# Prepend the backend dir to sys.path so env.py can `import app`.
prepend_sys_path = .

# Use os.pathsep to split list-valued paths.
path_separator = os


# Logging configuration, consumed by env.py via fileConfig.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
