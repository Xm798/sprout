services:
  sprout:
    environment:
      SPROUT_DATABASE_URL: postgresql+psycopg://sprout:sprout@postgres:5432/sprout
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: sprout
      POSTGRES_PASSWORD: sprout
      POSTGRES_DB: sprout
    volumes:
      - sprout-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sprout"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sprout-pg:
